name: Update World Cup Briefing

on:
  schedule:
    - cron: "45 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update World Cup briefing
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-worldcup-briefing.js

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/worldcup-briefing.json
          git diff --cached --quiet && echo "No briefing changes to commit" || git commit -m "Update World Cup briefing"
          git push
